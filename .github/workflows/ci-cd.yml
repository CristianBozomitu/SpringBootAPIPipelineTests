name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean install -DskipTests

  # Job 2: Code Quality Analysis
  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Check code style
        run: ./mvnw checkstyle:check || echo "Checkstyle warnings found"

  # Job 3: Docker Build and Verification
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: spring-boot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

  # Job 4: Deploy (only on main branch)
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Failed to trigger deployment (status: $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ Deployment triggered successfully"

      - name: Wait for deployment to go live
        run: |
          echo "⏳ Waiting for Render to build and deploy..."
          MAX_ATTEMPTS=20
          ATTEMPT=0

          until [ $ATTEMPT -ge $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              --connect-timeout 10 \
              "${{ secrets.RENDER_APP_URL }}/health")

            echo "Status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ App is live and healthy!"
              exit 0
            elif [ "$HTTP_STATUS" = "000" ]; then
              echo "⚠️ App not reachable yet, retrying in 15s..."
            else
              echo "⏳ Got status $HTTP_STATUS, retrying in 15s..."
            fi

            sleep 15
          done

          echo "❌ Deployment timed out after $((60 + MAX_ATTEMPTS * 15)) seconds"
          exit 1

      - name: Notify deployment success
        run: |
          echo "✅ Deployment successful!"
          echo "🚀 Application is live at ${{ secrets.RENDER_APP_URL }}"
